server:
  port: 8080

spring:
  application:
    name: stock-easy
  profiles:
    active: dev

  # Database Configuration
  datasource:
    url: jdbc:h2:mem:stock_easy_db
    username: sa
    password: password
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # WebJars Configuration
  webjars:
    enabled: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    com.example.stockeasy: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Application-specific Configuration
app:
  security:
    jwt:
      secret: "your-256-bit-secret-key-change-in-production"
      expiration: 86400000 # 24 hours in milliseconds
  stock:
    default-cash-balance: 100000.00
    max-watchlist-items: 20
    max-portfolio-items: 50
    market-data-refresh-interval: 300000 # 5 minutes in milliseconds
    default-fallback-price: 150.00 # Default price if no market data is available

# Alpha Vantage API Configuration
alpha-vantage:
  api-key: 5GCX2Q43JNOM112F # Replace with your actual API key
  base-url: "https://www.alphavantage.co"
  timeout: 30s
  rate-limit-delay: 12000 # 12 seconds between calls to stay under 5 calls/minute limit
  max-retries: 3
  cache-ttl: 15m

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:stock_easy_dev
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
      dialect: org.hibernate.dialect.H2Dialect
    show-sql: true
  thymeleaf:
    cache: false

# Development Alpha Vantage Configuration
alpha-vantage:
  api-key: "5GCX2Q43JNOM112F" # Use personal key for development
  cache-ttl: 5m # Shorter cache for development

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  thymeleaf:
    cache: false

# Test Alpha Vantage Configuration
alpha-vantage:
  api-key: "test" # Use test key for testing
  cache-ttl: 1m # Very short cache for testing
  max-retries: 1 # Fewer retries for faster tests

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:stock_easy}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  thymeleaf:
    cache: true

# Production Alpha Vantage Configuration
alpha-vantage:
  api-key: ${ALPHA_VANTAGE_API_KEY} # Must be set as environment variable
  cache-ttl: 30m # Longer cache for production
  rate-limit-delay: 15000 # More conservative rate limiting for production

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockEasy – Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">StockEasy</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/stocks">Stocks</a></li>
                <li class="nav-item"><a class="nav-link" href="/portfolio/dashboard">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link active" href="/watchlist">Watchlist</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="mb-3">Watchlist</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Symbol</th>
            <th>Notes</th>
        </tr>
        </thead>
        <tbody>
        <!-- Show each symbol from the controller -->
        <tr th:each="symbol : ${watchlist}">
            <td th:text="${symbol}">AAPL</td>
            <td>Demo item from controller</td>
        </tr>

        <!-- Message if list is empty -->
        <tr th:if="${#lists.isEmpty(watchlist)}">
            <td colspan="2" class="text-center text-muted">
                No watchlist items yet.
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

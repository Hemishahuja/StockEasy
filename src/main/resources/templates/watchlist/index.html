<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockEasy – Watchlist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">StockEasy</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/stocks">Stocks</a></li>
                <li class="nav-item"><a class="nav-link" href="/portfolio/dashboard">Portfolio</a></li>
                <li class="nav-item"><a class="nav-link active" href="/watchlist">Watchlist</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Optional messages -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Watchlist</h1>

        <!-- Button that opens the Add Stock modal -->
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addStockModal">
            + Add Stock to Watchlist
        </button>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col">Symbol</th>
                    <th scope="col">Price</th>
                    <th scope="col">Notes</th>
                </tr>
                </thead>
                <tbody>
                <!-- Rows from controller: List<WatchlistItem> watchlist -->
                <tr th:each="item : ${watchlist}">
                    <td th:text="${item.symbol}">AAPL</td>
                    <td th:text="${item.price != null ? '$' + #numbers.formatDecimal(item.price, 1, 2) : '$0.00'}">
                        $0.00
                    </td>
                    <td th:text="${item.notes}">Demo note</td>
                </tr>

                <!-- Show message if list is empty -->
                <tr th:if="${#lists.isEmpty(watchlist)}">
                    <td colspan="3" class="text-center text-muted py-4">
                        No stocks in your watchlist yet. Click “Add Stock to Watchlist” to get started.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal: Add Stock to Watchlist -->
<div class="modal fade" id="addStockModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <!-- Binds to model attribute newItem (WatchlistItem) -->
            <form th:action="@{/watchlist/add}" th:object="${newItem}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Add Stock to Watchlist</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Symbol</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{symbol}"
                               placeholder="e.g. AAPL"
                               required>
                    </div>
                    <!-- Price field REMOVED on purpose -->

                    <div class="mb-3">
                        <label class="form-label">Notes (optional)</label>
                        <textarea class="form-control"
                                  rows="3"
                                  th:field="*{notes}"
                                  placeholder="Why are you watching this stock?"></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancel</button>
                    <button type="submit"
                            class="btn btn-primary">Add to Watchlist</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

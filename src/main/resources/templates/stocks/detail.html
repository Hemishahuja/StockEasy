<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockEasy - Stock Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .stock-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }
        .price-display {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .price-change {
            font-size: 1.2rem;
        }
        .stock-up {
            color: #28a745;
        }
        .stock-down {
            color: #dc3545;
        }
        .navbar-brand {
            font-weight: bold;
            color: #007bff !important;
            transition: all 0.3s ease;
        }
        .navbar-brand:hover {
            color: #0056b3 !important;
            transform: scale(1.05);
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line"></i> StockEasy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/stocks">Stocks</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/portfolio/dashboard">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/watchlist">Watchlist</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user"></i> <span th:text="${user?.firstName ?? 'User'}"></span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/users/1">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Stock Header -->
    <div class="stock-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1><i class="fas fa-chart-line me-2"></i><span th:text="${stock?.symbol}"></span></h1>
                    <p class="mb-0" th:text="${stock?.companyName}"></p>
                </div>
                <div class="col-md-4 text-end">
                    <div class="price-display" th:text="'$' + ${stock?.currentPrice != null ? #numbers.formatDecimal(stock.currentPrice, 1, 2) : '0.00'}"></div>
                    <div class="price-change">
                        <span th:if="${stock?.isPriceUp()}" class="stock-up">
                            <i class="fas fa-arrow-up"></i>
                        </span>
                        <span th:if="${stock?.isPriceDown()}" class="stock-down">
                            <i class="fas fa-arrow-down"></i>
                        </span>
                        <span th:if="${stock?.priceChangePercent != null}"
                              th:class="${stock?.priceChangePercent > 0 ? 'stock-up' : 'stock-down'}"
                              th:text="${stock?.priceChangePercent > 0 ? '+' : ''} + #numbers.formatDecimal(stock.priceChangePercent, 1, 2) + '%'"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stock Information -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="chart-container">
                    <h3>Stock Information</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <strong>Symbol:</strong> <span th:text="${stock?.symbol}"></span>
                            </div>
